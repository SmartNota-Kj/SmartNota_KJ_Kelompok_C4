name: smartnota_kj
description: SmartNota KJ - Aplikasi Manajemen Arsip Foto Nota

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  pdf: ^3.10.8
  printing: ^5.12.0

  # ── Supabase ─────────────────────────────────────────
  supabase_flutter: ^2.3.4

  # ── Environment ──────────────────────────────────────
  flutter_dotenv: ^5.1.0

  # ── State Management ─────────────────────────────────
  provider: ^6.1.2

  # ── UI & Fonts ───────────────────────────────────────
  google_fonts: ^6.2.1
  cupertino_icons: ^1.0.6

  # ── Charts ───────────────────────────────────────────
  fl_chart: ^0.68.0

  # ── HTTP Client ──────────────────────────────────────
  http: ^1.2.0

  # ── Utilities ────────────────────────────────────────
  intl: ^0.19.0
  uuid: ^4.4.0
  path_provider: ^2.1.3
  image_picker: ^0.8.7+4

  # ── Download & Permission ─────────────────────────────
  gal: ^1.2.0
  permission_handler: ^11.3.1
  device_info_plus: ^10.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1 
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logoapp.jpeg"
  min_sdk_android: 21
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/images/logoapp.jpeg"